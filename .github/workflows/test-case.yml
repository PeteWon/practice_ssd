name: Flask Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: read

jobs:
  TestCase:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Start app stack
      run: docker compose up -d --build

    - name: Wait for app to be ready
      run: |
        for i in {1..30}; do
          curl -sf http://127.0.0.1/ && break
          sleep 2
        done

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Python Dependencies
      run: pip install -r web/requirements.txt

    - name: Run Selenium Tests
      working-directory: ./web
      run: python test_selenium.py

    - name: Wait for SonarQube to be ready
      run: |
        for i in {1..30}; do
          curl -sf http://127.0.0.1:9000/api/system/status | grep -q '"status":"UP"' && break
          sleep 5
        done

    - name: Install SonarScanner CLI
      run: |
        curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
        unzip -q sonar-scanner.zip
        echo "$PWD/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

    - name: Generate SonarQube token
      id: sonar_token
      run: |
        TOKEN=$(curl -s -u admin:admin -X POST "http://localhost:9000/api/user_tokens/generate" \
          -d "name=ci-token-$(date +%s)" | grep -o '"token":"[^"]*' | cut -d'"' -f4)
        echo "token=$TOKEN" >> $GITHUB_OUTPUT

    - name: SonarQube Scan
      run: |
        sonar-scanner \
          -Dsonar.projectKey=ssd-practical-test \
          -Dsonar.sources=web \
          -Dsonar.host.url=http://localhost:9000 \
          -Dsonar.token=${{ steps.sonar_token.outputs.token }}

    - name: Tear down app stack
      if: always()
      run: docker compose down