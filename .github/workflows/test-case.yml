name: Flask Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: read

jobs:
  TestCase:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Start app stack
      run: docker compose up -d --build

    - name: Wait for app to be ready
      run: |
        for i in {1..30}; do
          curl -sf http://127.0.0.1/ && break
          sleep 2
        done

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install matching Chrome + Chromedriver
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip curl chromium-browser

        CHROMEDRIVER_VERSION=137.0.7151.119
        curl -Lo chromedriver.zip https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/$CHROMEDRIVER_VERSION/linux64/chromedriver-linux64.zip
        unzip chromedriver.zip
        sudo mv chromedriver-linux64/chromedriver /usr/bin/chromedriver
        sudo chmod +x /usr/bin/chromedriver

    - name: Install Python Dependencies
      run: pip install -r web/requirements.txt

    - name: Run Selenium Tests
      working-directory: ./web
      run: python test_selenium.py

    - name: Tear down app stack
      if: always()
      run: docker compose down